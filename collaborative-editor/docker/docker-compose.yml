version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:6.0
    container_name: collaborative-editor-db
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: collaborative-editor
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - app-network

  # Backend API Server
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: collaborative-editor-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://admin:password@mongodb:27017/collaborative-editor?authSource=admin
      - JWT_SECRET=your-production-jwt-secret-change-this
      - FRONTEND_URL=http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    volumes:
      - ../backend/src/temp:/app/src/temp
    networks:
      - app-network

  # Frontend Web App
  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: collaborative-editor-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - app-network

  # Code Execution Sandbox (Optional - for enhanced security)
  code-executor:
    build:
      context: ./code-executor
      dockerfile: Dockerfile
    container_name: collaborative-editor-executor
    restart: unless-stopped
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - execution_sandbox:/tmp/sandbox
    networks:
      - app-network

volumes:
  mongodb_data:
    driver: local
  execution_sandbox:
    driver: local

networks:
  app-network:
    driver: bridge
