name: Deploy to AWS ECS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ap-northeast-1 | \
          docker login --username AWS --password-stdin \
          624307863587.dkr.ecr.ap-northeast-1.amazonaws.com

      - name: Build Docker image
        run: docker build -t docker-aws-video .

      - name: Tag image
        run: |
          docker tag docker-aws-video:latest \
          624307863587.dkr.ecr.ap-northeast-1.amazonaws.com/docker-aws/server:latest

      - name: Push to ECR
        run: |
          docker push \
          624307863587.dkr.ecr.ap-northeast-1.amazonaws.com/docker-aws/server:latest

      - name: Force ECS redeployment
        run: |
          aws ecs update-service \
          --cluster calculating-bird-hzealh \
          --service dokcer-service-ivx2z761 \
          --force-new-deployment \
          --region ap-northeast-1